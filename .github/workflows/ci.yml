name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci

      - name: Syntax check every tracked JS file
        run: |
          for f in $(git ls-files '*.js'); do node --check "$f"; done

      - name: Validate JSON
        run: |
          node -e "for (const f of ['package.json','contract/mno-verify.contract.json']) JSON.parse(require('fs').readFileSync(f,'utf8'));"

      - name: Unit tests
        run: npm test

  circuits:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - name: Install circom
        run: |
          curl -fsSL https://github.com/iden3/circom/releases/download/v2.2.3/circom-linux-amd64 -o "$RUNNER_TEMP/circom"
          chmod +x "$RUNNER_TEMP/circom"
          "$RUNNER_TEMP/circom" --version
      - name: Compile circuits and validate hash160 against the generator vector
        run: CIRCOM="$RUNNER_TEMP/circom" bash scripts/check_circuits.sh

  # Not yet a job: compiling the full single-tier mno_membership.circom needs circom-ecdsa
  # (ECDSAPrivToPub) wired in, and the deployment also needs a transparent trusted setup.
  # The in-circuit hash160, the part unique to this project, is already validated above.
