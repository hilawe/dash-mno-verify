name: risc0-registration-bench

# Research prototype for the proving-cost track (docs/REDUCING_PROVING_COST.md).
# Separate from the main ci workflow. It runs only on manual dispatch or when the
# prototype changes, because it installs the RISC Zero toolchain and runs a real
# proof, which is heavy. A GitHub-hosted ubuntu-latest runner is x86_64 with about
# 16 GB of memory, so this doubles as the Phase 0 gate test: does the registration
# proof fit a roughly 16 GB masternode-class box. If the run step is killed for
# memory, that is itself the answer (it needs more than the runner has). If it
# completes, the "Maximum resident set size" line is the measured peak.
#
# The last two steps run the production five-claim statement (guest v2 of
# docs/ZKVM_INTEGRATION.md, the derive statement with the real journal), first
# measured openly with its journal asserted against the circomlibjs-pinned
# vectors, then inside an enforced 8 GB cgroup with swap off, the acceptance bar
# as tightened on 2026-07-23 (see the gate section of
# docs/REDUCING_PROVING_COST.md). The capped step passing demonstrates the 8 GB
# fit; an out-of-memory termination is the honest negative answer.
on:
  workflow_dispatch:
  push:
    paths:
      - "research/risc0-registration/**"
      - ".github/workflows/risc0-registration-bench.yml"

jobs:
  bench:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Runner resources
        run: |
          echo "arch: $(uname -m)"
          echo "cpus: $(nproc)"
          free -h

      - name: Install the RISC Zero toolchain (pinned)
        run: |
          curl -L https://risczero.com/install | bash
          echo "$HOME/.risc0/bin" >> "$GITHUB_PATH"

      - name: rzup install (pinned release)
        # Pin the RISC Zero release so a fresh runner cannot compile different guest bytes,
        # a different image id, or a different acceleration profile than the recorded numbers
        # (review finding, reproducibility). RISC0_RELEASE is the single knob; bump it
        # deliberately and re-measure.
        env:
          RISC0_RELEASE: "3.0.5"
        run: |
          rzup install rust "$RISC0_RELEASE"
          rzup install r0vm "$RISC0_RELEASE"
          rzup install cpp || true

      - name: Record toolchain and dependency versions
        working-directory: research/risc0-registration
        run: |
          echo "== rzup"; rzup show || true
          echo "== r0vm"; r0vm --version || true
          echo "== rustc"; rustc --version
          echo "== Cargo.lock present:"; ls -l Cargo.lock host/Cargo.lock methods/guest/Cargo.lock 2>/dev/null || true

      - name: Build host and guest (release)
        working-directory: research/risc0-registration
        run: cargo build --release -p host

      - name: Guest soundness checks (executor only, fast)
        working-directory: research/risc0-registration
        run: |
          echo "runs the promised rejection and boundary cases through the executor, no proving"
          ./target/release/host check

      - name: Member-side artifact sizes
        working-directory: research/risc0-registration
        run: |
          echo "host prover binary (what a member runs):"
          ls -l target/release/host
          du -h target/release/host
          echo "r0vm prover runtime (shared, installed once):"
          ls -l "$HOME/.risc0/bin/r0vm" 2>/dev/null || echo "r0vm not at the expected path"
          du -h "$HOME/.risc0/bin/r0vm" 2>/dev/null || true

      - name: Derive-key statement, peak-memory measurement
        working-directory: research/risc0-registration
        run: |
          echo "the Maximum resident set size line below is the Phase 0 gate number (derive)"
          /usr/bin/time -v ./target/release/host derive

      - name: Signature statement, peak-memory measurement
        working-directory: research/risc0-registration
        run: |
          echo "the Maximum resident set size line below is the Phase 0 gate number (sig)"
          /usr/bin/time -v ./target/release/host sig

      - name: Recovery/hinted statement, peak-memory measurement
        working-directory: research/risc0-registration
        run: |
          echo "the Maximum resident set size line below is the Phase 0 gate number (rec)"
          /usr/bin/time -v ./target/release/host rec

      - name: Production statement (guest v2), measurement and journal check
        working-directory: research/risc0-registration
        run: |
          echo "the five-claim production statement of docs/ZKVM_INTEGRATION.md; the host"
          echo "asserts the full 136-byte journal against the circomlibjs-pinned vectors"
          /usr/bin/time -v ./target/release/host reg

      - name: Production statement at small segments (po2 19) under an enforced 8 GB cap
        working-directory: research/risc0-registration
        run: |
          echo "re-runs the production-statement prover inside an 8 GB cgroup with swap off,"
          echo "at segment_limit_po2=19, since prover peak memory tracks segment size and the"
          echo "default segments put this statement at 9.6 GB. A pass DEMONSTRATES the 8 GB"
          echo "fit at the cost of proportionally more segments; an out-of-memory termination"
          echo "is the honest negative answer (docs/REDUCING_PROVING_COST.md, gate section)."
          sudo env "PATH=$PATH" MNO_SEGMENT_PO2=19 systemd-run --scope --collect \
            -p MemoryMax=8G -p MemorySwapMax=0 \
            /usr/bin/time -v ./target/release/host reg

      - name: Signature statement at small segments (po2 19), memory re-check
        working-directory: research/risc0-registration
        run: |
          echo "re-measures the wallet-custody signature statement at segment_limit_po2=19."
          echo "If the peak drops from 9.6 GB toward the small-segment tier, the wallet-custody"
          echo "rejection was partly an artifact of the default segment size and the decision"
          echo "gets revisited on this evidence."
          MNO_SEGMENT_PO2=19 /usr/bin/time -v ./target/release/host sig

      - name: Unwrapped candidate, gateway-side verification cost
        working-directory: research/risc0-registration
        run: |
          echo "times repeated STARK-receipt verifications on the receipt the reg step wrote,"
          echo "the per-registration cost a gateway verifier sidecar would pay (step 3)"
          ./target/release/host verify receipt_reg.bin

      - name: Unwrapped candidate, Node-side verification and request size
        working-directory: research/risc0-registration
        run: |
          echo "the real gateway path: a Node harness decodes the exact request body, binds"
          echo "the guest image id to the journal, invokes the verifier, rejects a wrong id,"
          echo "and reports request wire size and latency (step 3 decision inputs)."
          IMAGE_ID=$(./target/release/host verify receipt_reg.bin | sed -n 's/^\[verify\] image_id: //p')
          echo "image id: $IMAGE_ID"
          node scripts/verify_receipt.mjs unwrapped "$IMAGE_ID"

      - name: Wrapped candidate, prove-and-wrap under the 8 GB cap (cgroup-scoped)
        working-directory: research/risc0-registration
        run: |
          echo "the Groth16-wrapped candidate (step 3), under the SAME 8 GB cap as the prove."
          echo "RISC Zero's Groth16 prover runs in docker, so the systemd scope alone would"
          echo "miss the daemon's memory. This runs docker under the same cgroup slice AND"
          echo "polls the docker cgroup peak, so the true combined peak is captured, not just"
          echo "the host process (the unanimous review finding)."
          docker --version
          # Start a background poller of the whole docker cgroup's peak memory.
          ( PEAK=0
            for _ in $(seq 1 3600); do
              CUR=$(cat /sys/fs/cgroup/system.slice/docker.service/memory.peak 2>/dev/null || echo 0)
              [ "$CUR" -gt "$PEAK" ] && PEAK=$CUR
              echo "$PEAK" > /tmp/docker_peak
              sleep 2
            done ) &
          POLLER=$!
          sudo env "PATH=$PATH" MNO_SEGMENT_PO2=19 systemd-run --scope --collect \
            -p MemoryMax=8G -p MemorySwapMax=0 \
            /usr/bin/time -v ./target/release/host wrap || echo "WRAP STEP non-zero exit (OOM is a valid negative result)"
          kill "$POLLER" 2>/dev/null || true
          echo "docker cgroup peak bytes: $(cat /tmp/docker_peak 2>/dev/null || echo unknown)"
          echo "seal head:"; head -c 200 wrap_seal.hex; echo

      - name: Wrapped candidate, Node-side verification and request size
        working-directory: research/risc0-registration
        if: always()
        run: |
          echo "same Node harness on the wrapped receipt, if the wrap step produced one"
          if [ -f wrap_receipt.bin ]; then
            IMAGE_ID=$(./target/release/host verify receipt_reg.bin | sed -n 's/^\[verify\] image_id: //p')
            node scripts/verify_receipt.mjs wrapped "$IMAGE_ID"
          else
            echo "no wrap_receipt.bin (wrap step did not complete), skipping"
          fi
